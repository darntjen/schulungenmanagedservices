
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Preiskalkulator-Trainer – Nösse Datentechnik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1624;--bg2:#111f33;--bg3:#162844;
      --border:#1e3354;--border2:#264466;
      --green:#6abf4b;--gdim:#6abf4b18;--gdk:#3d7a27;
      --red:#e05252;--rdim:#e0525218;
      --blue:#4da8da;--bdim:#4da8da18;
      --gold:#e8b84b;--ydim:#e8b84b18;
      --teal:#4bc4b8;--tdim:#4bc4b818;--tdk:#2a7a72;
      --orange:#e8873a;--odim:#e8873a18;
      --purple:#b07fe8;--pdim:#b07fe818;
      --text:#ddeeff;--text2:#8aacc8;--text3:#5a7a96;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
    button{font-family:inherit;cursor:pointer;border:none;}
    input[type=number]{font-family:inherit;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

    /* ── HEADER ── */
    .site-header{background:linear-gradient(180deg,#0a1420,#0b1624);border-bottom:1px solid var(--border);padding:0 24px;}
    .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px;}
    .hbadge{font-size:11px;background:var(--gdim);color:var(--green);border:1px solid var(--green);border-radius:4px;padding:3px 9px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;white-space:nowrap;}

    /* ── HERO ── */
    .hero-band{background:linear-gradient(135deg,#0d1e35,#0f2540,#122e4a);border-bottom:2px solid var(--gdk);padding:20px 24px 16px;text-align:center;}
    .hero-band h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,26px);font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;margin-bottom:4px;}
    .hero-band h1 span{color:var(--green);}
    .hero-band p{font-size:13px;color:var(--text2);max-width:640px;margin:0 auto;line-height:1.6;}

    .main{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}

    /* ── BACK BAR ── */
    .back-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
    .btn-back{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:7px 13px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;}
    .btn-back:hover{border-color:var(--text2);color:var(--text);}
    .back-label{font-size:11px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;}

    /* ── SELECTION SCREENS (TG / SG / PICK) ── */
    .sel-intro-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;margin-bottom:5px;}
    .sel-intro-sub{font-size:13px;color:var(--text2);line-height:1.6;max-width:580px;margin-bottom:20px;}
    .card-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:620px){.card-grid-2{grid-template-columns:1fr;}}
    .sel-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px 20px;cursor:pointer;transition:all .18s;user-select:none;}
    .sel-card:hover{background:var(--bg3);transform:translateY(-2px);}
    .sel-card-num{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
    .sel-card-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:9px;}
    .sel-card-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:12px;}
    .sel-card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;}
    .sel-tag{font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:2px 8px;color:var(--text3);}
    .sel-cta{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}

    /* TG colors */
    .tg1-card{border-top:4px solid var(--blue);} .tg1-card .sel-card-num{color:var(--blue);} .tg1-card .sel-cta{color:var(--blue);}
    .tg2-card{border-top:4px solid var(--green);} .tg2-card .sel-card-num{color:var(--green);} .tg2-card .sel-cta{color:var(--green);}
    /* SG colors */
    .sg1-card{border-top:4px solid var(--teal);} .sg1-card .sel-card-num{color:var(--teal);} .sg1-card .sel-cta{color:var(--teal);}
    .sg2-card{border-top:4px solid var(--purple);} .sg2-card .sel-card-num{color:var(--purple);} .sg2-card .sel-cta{color:var(--purple);}

    /* PICK SCREEN */
    .pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:11px;}
    .pick-card{background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--accent,var(--green));border-radius:8px;padding:15px;cursor:pointer;transition:all .18s;user-select:none;}
    .pick-card:hover{background:var(--bg3);border-color:var(--accent,var(--green));transform:translateY(-2px);}
    .pick-num{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent,var(--green));margin-bottom:5px;}
    .pick-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:3px;}
    .pick-industry{font-size:11px;color:var(--text3);margin-bottom:8px;}
    .pick-facts{display:flex;flex-direction:column;gap:3px;margin-bottom:9px;}
    .pick-fact{font-size:12px;color:var(--text2);}
    .pick-hint{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:8px;border-left:2px solid var(--border2);padding-left:8px;line-height:1.45;}
    .pick-cta{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent,var(--green));}

    /* ── QUIZ LAYOUT ── */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
    @media(max-width:720px){.grid2{grid-template-columns:1fr;}}

    /* CUSTOMER CARD */
    .customer-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:sticky;top:14px;}
    .customer-header{padding:13px 16px 10px;border-bottom:1px solid var(--border);}
    .customer-industry{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
    .customer-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:#fff;}
    .sg-pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-top:5px;}
    .sg1-pill{background:var(--tdim);color:var(--teal);border:1px solid var(--tdk);}
    .sg2-pill{background:var(--pdim);color:var(--purple);border:1px solid #6040a8;}
    .facts-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:10px 16px;border-bottom:1px solid var(--border);}
    .fact-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
    .statements-box{padding:10px 16px;}
    .stmts-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
    .stmt{font-size:13px;font-style:italic;color:var(--text2);line-height:1.55;border-left:2px solid var(--gold);padding-left:10px;margin-bottom:6px;}
    .stmt:last-child{margin-bottom:0;}

    /* ── SELECTOR ── */
    .selector-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:15px;}
    .sel-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:11px;}

    /* Nösse Connect */
    .nc-block{background:var(--odim);border:2px solid var(--orange);border-radius:7px;padding:9px 11px;margin-bottom:14px;}
    .nc-block-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:6px;}
    .nc-hint{font-size:11px;color:var(--text2);margin-top:5px;line-height:1.45;}

    /* Group separators */
    .group-sep{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .group-sub{font-size:10px;color:var(--text3);font-style:italic;font-weight:400;text-transform:none;letter-spacing:0;margin-left:6px;}
    .group-lbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border);}
    .group-lbl.hornet-lbl{color:var(--teal);border-bottom-color:var(--tdk);}
    .group-blk{margin-bottom:12px;}
    .group-blk.hornet-blk{background:var(--tdim);border:1px solid var(--tdk);border-radius:6px;padding:9px 10px;}

    /* Option rows */
    .option-row{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);margin-bottom:4px;cursor:pointer;transition:all .14s;user-select:none;}
    .option-row:hover:not(.locked){border-color:var(--border2);background:var(--bg3);}
    .option-row.selected{background:var(--bg3);border-color:var(--green);}
    .option-row.locked{opacity:.4;cursor:default;}
    /* NC row */
    .option-row.nc-row{border-color:var(--orange)!important;background:rgba(232,135,58,.07);}
    .option-row.nc-row.selected{background:rgba(232,135,58,.18);}
    .option-row.nc-row.selected .opt-check{border-color:var(--orange);background:var(--orange);}
    .option-row.nc-row .opt-check{border-color:var(--orange);}
    .option-row.nc-row.selected .opt-price{color:var(--orange);}
    /* Check */
    .opt-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .14s;margin-top:2px;}
    .option-row.selected .opt-check{border-color:var(--green);background:var(--green);}
    .opt-check-inner{width:7px;height:7px;border-radius:50%;background:#0b1624;display:none;}
    .option-row.selected .opt-check-inner{display:block;}
    .opt-info{flex:1;min-width:0;}
    .opt-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.2;}
    .opt-sub{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.3;}
    .opt-price{font-size:11px;color:var(--text3);margin-top:3px;}
    .option-row.selected .opt-price{color:var(--green);}
    /* Hornet rows */
    .hornet-blk .option-row{background:rgba(11,22,36,.7);border-color:#1e4040;}
    .hornet-blk .option-row:hover:not(.locked){border-color:var(--teal);}
    .hornet-blk .option-row.selected{border-color:var(--teal);background:rgba(75,196,184,.12);}
    .hornet-blk .option-row.selected .opt-check{border-color:var(--teal);background:var(--teal);}
    .hornet-blk .option-row.selected .opt-price{color:var(--teal);}

    /* ── QUANTITY INPUT (SG2) ── */
    .qty-wrap{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap;}
    .qty-label{font-size:11px;color:var(--text3);white-space:nowrap;}
    .qty-input{width:72px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:4px 8px;font-size:13px;font-weight:600;text-align:right;transition:border .14s;}
    .qty-input:focus{outline:none;border-color:var(--purple);}
    .qty-input.valid{border-color:var(--green);}
    .qty-input.warn{border-color:var(--gold);}
    .qty-calc{font-size:11px;color:var(--text3);}
    .qty-calc.pos{color:var(--green);font-weight:600;}

    /* ── PRICE SUMMARY ── */
    .price-summary{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:11px 13px;margin:12px 0 10px;}
    .psrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
    .psrow.total{border-top:1px solid var(--border);padding-top:7px;margin-top:4px;margin-bottom:0;}
    .ps-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
    .ps-val{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;color:var(--green);}
    .ps-val.init{font-size:17px;color:var(--gold);}
    .ps-sub{font-size:11px;color:var(--text3);}
    .nc-warn-bar{background:var(--rdim);border:1px solid var(--red);border-radius:6px;padding:8px 11px;margin-bottom:9px;font-size:12px;color:var(--red);font-weight:600;}

    .btn-submit{width:100%;padding:12px;background:var(--green);color:#0b1624;border-radius:6px;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:background .15s;}
    .btn-submit:hover{background:#7dd65e;}
    .btn-submit:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}

    /* ── FEEDBACK ── */
    .feedback-wrap{margin-top:18px;}
    .fb-header{background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--green);border-radius:8px;padding:15px;margin-bottom:10px;}
    .fb-price-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px;}
    @media(max-width:580px){.fb-price-row{grid-template-columns:1fr 1fr;}}
    .fb-price-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;}
    .fb-price-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
    .fb-price-val{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;}
    .fb-price-sub{font-size:11px;color:var(--text3);margin-top:2px;}
    .fb-sec{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;}
    .fb-sec-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
    .fbs-g .fb-sec-title{color:var(--green);} .fbs-r .fb-sec-title{color:var(--red);} .fbs-b .fb-sec-title{color:var(--blue);}
    .fbi{font-size:13px;color:var(--text2);line-height:1.6;padding:6px 10px;border-radius:5px;margin-bottom:4px;}
    .fbi:last-child{margin-bottom:0;}
    .fbi-g{background:var(--gdim);border:1px solid var(--gdk);} .fbi-r{background:var(--rdim);border:1px solid var(--red);} .fbi-b{background:var(--bdim);border:1px solid var(--blue);}
    .fb-nav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
    .btn-next{padding:10px 14px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;}
    .btn-next:hover{border-color:var(--text2);color:var(--text);}

    .site-footer{border-top:1px solid var(--border);padding:15px 24px;text-align:center;font-size:12px;color:var(--text3);margin-top:12px;}
    .site-footer strong{color:var(--text2);}
  </style>
</head>

// Unit labels for qty inputs
const UNIT_LABEL = {
  user:'Benutzer', server:'Server', device:'Geräte/Handys',
  ap:'Access Points', mob_user:'Mobilnutzer', flat:null
};

// ── State ─────────────────────────────────────────────────────────────────────
let phase      = "tg";       // tg | sg | pick | quiz
let activeTg   = null;       // "tg1"|"tg2"
let activeSg   = null;       // "sg1"|"sg2"
let currentSc  = null;       // index in SC
let selections = {};        // id -> bool
let userQty    = {};         // id -> number (sg2 only)
let submitted  = false;

// ── Helpers ───────────────────────────────────────────────────────────────────
function getQty(sc, id){
  const s = SVC[id];
  if(!s || s.unit === 'flat') return 1;
  if(activeSg === 'sg2'){
    const v = parseFloat(userQty[id]);
    return isNaN(v) || v < 0 ? 0 : v;
  }
  const q = sc.quantities;
  if(s.unit==='user')     return q.user||0;
  if(s.unit==='server')   return q.server||0;
  if(s.unit==='device')   return q.device||0;
  if(s.unit==='ap')       return q.ap||0;
  if(s.unit==='mob_user') return q.mob_user||0;
  return 1;
}
function calcMonthly(sc, sel){
  let t=0;
  Object.keys(sel).forEach(id=>{
    if(!sel[id]) return;
    const s=SVC[id]; if(!s) return;
    t += s.price * getQty(sc, id);
  });
  return t;
}
function calcInitial(sel){ return sel['nc'] ? 1200 : 0; }
function fmtEur(n){ return (Math.round(n*100)/100).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }

function basePriceLabel(id){
  const s=SVC[id]; if(!s) return '';
  return fmtEur(s.price)+(s.unit==='flat'?' / Monat'+(s.onboarding?' + '+fmtEur(s.onboarding)+' einmalig':''):'  / '+((UNIT_LABEL[s.unit])||'Einheit'));
}

// ── Navigation ────────────────────────────────────────────────────────────────
function pickTg(tg){ activeTg=tg; phase='sg'; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function pickSg(sg){ activeSg=sg; phase='pick'; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function pickScenario(idx){ currentSc=idx; selections={}; userQty={}; submitted=false; phase='quiz'; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function backToTg(){ phase='tg'; activeTg=null; activeSg=null; currentSc=null; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function backToSg(){ phase='sg'; activeSg=null; currentSc=null; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function backToPick(){ phase='pick'; submitted=false; selections={}; userQty={}; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function selectItem(id){
  if(submitted) return;
  const sc = SC[currentSc];
  if(!sc.available.includes(id)) return;
  const s = SVC[id];

  // Within-tier mutual exclusion: only mus vs mup, mss vs msp, msecs vs msecp
  const tierPairs = {'mus':'mup','mup':'mus','mss':'msp','msp':'mss','msecs':'msecp','msecp':'msecs'};
  if(tierPairs[id]) selections[tierPairs[id]] = false;

  if(!selections[id]){
    // Turning ON
    selections[id] = true;
    if(activeSg === 'sg2' && SVC[id].unit !== 'flat') userQty[id] = userQty[id] || '';
  } else {
    // Turning OFF
    selections[id] = false;
    if(activeSg === 'sg2') delete userQty[id];
  }
  render();
}

function setQty(id, val){
  userQty[id] = val;
  // re-render price summary without full re-render to avoid losing focus
  const ps = document.getElementById('price-summary-area');
  const sc = SC[currentSc];
  if(ps) ps.innerHTML = buildPriceSummary(sc);
}

  const ev = sc.eval;
  const monthly = calcMonthly(sc, sel);
  const initial = calcInitial(sel);
  const items = Object.keys(sel).filter(k=>sel[k]);
  const correct=[], wrong=[], missing=[], upsell=[];

  if(!sel['nc']){
    missing.push('🔴 Managed Nösse Connect fehlt! Ohne Connect kann kein einziger Service gebucht werden. Monatlich: 249 € + einmalig 1.200 € Onboarding.');

    correct.unshift({id:'nc', fb:'✓ Managed Nösse Connect gebucht – die Voraussetzung für alle Services. 249 € / Monat + 1.200 € Onboarding einmalig.'});

    items.filter(id=>id!=='nc').forEach(id=>{
      const s=SVC[id]; if(!s||s.unit==='flat') return;
      const entered=parseFloat(userQty[id]);
      const expected=getExpectedQty(sc,id);

        wrong.push({id, fb:`⚠ Keine Anzahl für „${s.name}" eingegeben – ohne Anzahl kann kein Preis berechnet werden.`});

  }

  // Missing checks
  const hasUserCov = sel['mus']||sel['mup']||sel['ep_u']||sel['pm_u']||sel['mon_u'];
  const hasServerCov = sel['mss']||sel['msp']||sel['ep_s']||sel['pm_s']||sel['mon_s'];
  if(ev.user_min && !hasUserCov && (q.user||0)>0 && ev.missing_user) missing.push(ev.missing_user);
  if(ev.server_min && !hasServerCov && (q.server||0)>0 && ev.missing_server) missing.push(ev.missing_server);
  if(ev.security_min==='msecp'&&!sel['msecp']&&!sel['itsb']&&ev.missing_msecp) missing.push(ev.missing_msecp);
  if(ev.security_min==='msecs'&&!sel['msecs']&&!sel['msecp']&&!sel['fw']&&!sel['m365b']&&!sel['adbase']&&ev.missing_msecs) missing.push(ev.missing_msecs);
  ev.addons_required.forEach(aid=>{ if(!sel[aid]){ const k='missing_'+aid; if(ev[k]) missing.push(ev[k]); } });
  if((q.mob_user||0)>0){
    if(!['h1_mob','h2_mob','h3_mob','h4_mob'].some(k=>sel[k])&&ev.missing_hornet_mob) missing.push(ev.missing_hornet_mob);
  }
  ev.addons_recommended.forEach(aid=>{
    if(!sel[aid]&&!items.includes(aid)){
      const k='missing_'+aid; if(ev[k]) upsell.push({id:aid, fb:'ℹ '+SVC[aid].name+': '+ev[k]});
    }
  });

  const target_min=ev.price_min+249, target_max=ev.price_max+249;
  const inRange=monthly>=target_min&&monthly<=target_max;
  let verdict,vColor;
  if(monthly===0)          {verdict='Kein Angebot erstellt';               vColor='var(--red)';}
  else if(!sel['nc'])      {verdict='Nösse Connect fehlt!';               vColor='var(--red)';}
  else if(inRange)         {verdict='Im richtigen Bereich ✓';            vColor='var(--green)';}
  else if(monthly<target_min){verdict='Zu niedrig – Positionen fehlen';  vColor='var(--gold)';}
  else                     {verdict='Über Richtwert – Auswahl prüfen';   vColor='var(--gold)';}

  return {correct,wrong,missing,upsell,monthly,initial,verdict,vColor,priceMin:target_min,priceMax:target_max};
}

function getExpectedQty(sc, id){
  const s=SVC[id]; const q=sc.quantities;
  if(!s) return 0;
  if(s.unit==='user')     return q.user||0;
  if(s.unit==='server')   return q.server||0;
  if(s.unit==='device')   return q.device||0;
  if(s.unit==='ap')       return q.ap||0;
  if(s.unit==='mob_user') return q.mob_user||0;
  return 0;
}

// ── Build price summary HTML ───────────────────────────────────────────────────
function buildPriceSummary(sc){
  const monthly=calcMonthly(sc,selections);
  const initial=calcInitial(selections);
  const hasAny=Object.values(selections).some(v=>v);
  const ncWarn=hasAny&&!selections['nc']?`<div class="nc-warn-bar">⚠ Managed Nösse Connect noch nicht gewählt!</div>`:'';
  return `${ncWarn}<div class="price-summary">
    <div class="psrow"><div><div class="ps-lbl">Monatlich laufend</div><div class="ps-sub">netto / Monat</div></div><div class="ps-val">${fmtEur(monthly)}</div></div>
    <div class="psrow total"><div><div class="ps-lbl">Einmalig Onboarding</div><div class="ps-sub">netto, einmalig</div></div><div class="ps-val init">${fmtEur(initial)}</div></div>
  </div>`;
}

// ── Build option row HTML ─────────────────────────────────────────────────────
function buildOptionRow(sc, id, extraCls){
  const s=SVC[id]; if(!s) return '';
  const isSel=!!selections[id];
  const cls='option-row'+(isSel?' selected':'')+(submitted?' locked':'')+(extraCls?' '+extraCls:'');
  const qty=activeSg==='sg2'&&isSel&&s.unit!=='flat';
  let qtyHtml='';
  if(qty){
    const val=userQty[id]??'';
    const expected=getExpectedQty(sc,id);
    const num=parseFloat(val);
    const linePrice=(!isNaN(num)&&num>0)?fmtEur(s.price*num)+' / Monat':'—';
    const inputCls='qty-input'+(!isNaN(num)&&num>0?expected>0&&Math.abs(num-expected)/expected<=0.15?' valid':' warn':'');
    qtyHtml=`<div class="qty-wrap">
      <span class="qty-label">Anzahl ${UNIT_LABEL[s.unit]||''}:</span>
      <input type="number" class="${inputCls}" min="0" step="1" value="${val}"
        onclick="event.stopPropagation()"
        oninput="event.stopPropagation();userQty['${id}']=this.value;setQty('${id}',this.value);this.className='qty-input'+(!isNaN(parseFloat(this.value))&&parseFloat(this.value)>0?''  +(${expected}>0&&Math.abs(parseFloat(this.value)-${expected})/${expected}<=0.15?' valid':' warn'):'');"
      />
      <span class="qty-calc pos">${linePrice}</span>
    </div>`;
  } else if(!qty&&isSel&&activeSg==='sg1'&&s.unit!=='flat'){
    const expected=getExpectedQty(sc,id);
    qtyHtml=`<div class="qty-wrap"><span class="qty-label">Anzahl aus Szenario:</span><span class="qty-calc pos">${expected} ${UNIT_LABEL[s.unit]||''} → ${fmtEur(s.price*expected)} / Monat</span></div>`;
  }
  return `<div class="${cls}" onclick="selectItem('${id}')">
    <div class="opt-check"><div class="opt-check-inner"></div></div>
    <div class="opt-info">
      <div class="opt-name">${s.name}</div>
      <div class="opt-sub">${s.sub}</div>
      <div class="opt-price">${basePriceLabel(id)}</div>
      ${qtyHtml}
    </div>
  </div>`;
}

  const tgLabel=activeTg==='tg1'?'Zielgruppe 1':'Zielgruppe 2';
  const sgLabel=activeSg==='sg1'?'Schwierigkeitsgrad 1':'Schwierigkeitsgrad 2';

    const gi=SC.indexOf(sc);
    cards+=`<div class="pick-card" style="--accent:${sc.color}" onclick="pickScenario(${gi})">

      <div class="pick-name">${sc.name}</div>
      <div class="pick-industry">${sc.industry}</div>
      <div class="pick-facts">${sc.facts.slice(0,3).map(f=>`<span class="pick-fact">${f.icon} ${f.label}</span>`).join('')}</div>
      ${sc.solution_hint?`<div class="pick-hint">${sc.solution_hint}</div>`:''}
      <div class="pick-cta">Fall öffnen →</div>
    </div>`;
  });
  return `
    <div class="back-bar">
      <button class="btn-back" onclick="backToSg()">← Schwierigkeitsgrad wechseln</button>
      <span class="back-label">${tgLabel} · ${sgLabel}</span>

}

// ── SCREEN 4: Quiz ────────────────────────────────────────────────────────────
function renderQuiz(){
  const sc=SC[currentSc];
  const tgSc=SC.filter(s=>s.tg===activeTg);
  const li=tgSc.indexOf(sc);
  const nextGi=SC.indexOf(tgSc[(li+1)%tgSc.length]);
  const tgLabel=activeTg==='tg1'?'ZG 1':'ZG 2';
  const sgLabel=activeSg==='sg1'?'SG 1':'SG 2';
  const gpLabel=activeTg==='tg1'?'Geschäftsführer':'IT-Leiter';

  // Customer card
  const factsHtml=sc.facts.map(f=>`<div class="fact-item"><span>${f.icon}</span>${f.label}</div>`).join('');
  const stmtsHtml=sc.statements.map(s=>`<div class="stmt">${s}</div>`).join('');
  const customerHtml=`<div class="customer-card">
    <div class="customer-header">
      <div class="customer-industry">${sc.industry}</div>
      <div class="customer-name">${sc.name}</div>
      <div><span class="sg-pill ${activeSg}-pill">${activeSg==='sg1'?'Schwierigkeitsgrad 1 – Mengen automatisch':'Schwierigkeitsgrad 2 – Mengen selbst eingeben'}</span></div>
    </div>
    <div class="facts-grid">${factsHtml}</div>
    <div class="statements-box">
      <div class="stmts-label">Der ${gpLabel} sagt:</div>
      ${stmtsHtml}
    </div>
  </div>`;

  // NC block
  const ncSel=!!selections['nc'];
  const ncCls='option-row nc-row'+(ncSel?' selected':'')+(submitted?' locked':'');
  const ncHtml=`<div class="nc-block">
    <div class="nc-block-lbl">⚡ Zwingend erforderlich – Voraussetzung für alle Services</div>
    <div class="${ncCls}" onclick="selectItem('nc')">
      <div class="opt-check"><div class="opt-check-inner"></div></div>
      <div class="opt-info">
        <div class="opt-name">Managed Nösse Connect</div>
        <div class="opt-sub">Serviceplattform-Anbindung · SLA · Serviceportal · Fernwartungszugang · Mo–Fr 08–18 Uhr</div>
        <div class="opt-price">249,00 € / Monat &nbsp;+&nbsp; 1.200,00 € einmalig (Onboarding)</div>
      </div>
    </div>
    ${!ncSel&&!submitted?'<div class="nc-hint">Managed Nösse Connect muss immer als erstes gebucht werden – ohne diesen Service können keine weiteren Services gebucht werden.</div>':''}
  </div>`;

  // Service groups
  const groups=[
    {sep:'Benutzer-Absicherung',sub:'Bundle oder Einzelservices – beide gleichzeitig wählbar zum Vergleich'},
    {key:'user',    lbl:'Bundle – Benutzer',                              ids:['mus','mup']},
    {key:'einz_u',  lbl:'Einzelservices – Benutzer',                     ids:['ep_u','pm_u','mon_u']},
    {sep:'Server-Absicherung',sub:'Bundle oder Einzelservices – beide gleichzeitig wählbar zum Vergleich'},
    {key:'server',  lbl:'Bundle – Server',                                ids:['mss','msp']},
    {key:'einz_s',  lbl:'Einzelservices – Server',                       ids:['ep_s','pm_s','mon_s','bak_s']},
    {sep:'Sicherheits-Absicherung',sub:'Bundle oder Einzelservices – beide gleichzeitig wählbar zum Vergleich'},
    {key:'security',lbl:'Bundle – Security',                              ids:['msecs','msecp']},
    {key:'einz_sec',lbl:'Einzelservices – Security',                     ids:['fw','m365b','adbase','itsb','svm','svm_c','svm_s']},
    {sep:'Add-on Services',sub:'Mehrfachauswahl möglich'},
    {key:'addon',   lbl:'Add-on Services',                               ids:['mdru','mdrs','sat','mdm','wifi']},
  ];
  const hornetMob={key:'hm',lbl:'Hornetsecurity – Mobilnutzer ohne User-Bundle',ids:['h2_mob','h3_mob']};
  const hornetUp= {key:'hu',lbl:'Hornet Upgrade Plan 3→4 – Aufpreis auf MUP',    ids:['h4_up']};

  let groupsHtml='';
  groups.forEach(g=>{
    if(g.sep){
      groupsHtml+=`<div class="group-sep">${g.sep}<span class="group-sub">${g.sub}</span></div>`;
      return;
    }
    const avail=g.ids.filter(id=>sc.available.includes(id));
    if(!avail.length) return;
    const rows=avail.map(id=>buildOptionRow(sc,id,'')).join('');
    groupsHtml+=`<div class="group-blk"><div class="group-lbl">${g.lbl}</div>${rows}</div>`;
  });
  [hornetMob,hornetUp].forEach(g=>{
    const avail=g.ids.filter(id=>sc.available.includes(id));
    if(!avail.length) return;
    const rows=avail.map(id=>buildOptionRow(sc,id,'')).join('');
    groupsHtml+=`<div class="group-blk hornet-blk"><div class="group-lbl hornet-lbl">${g.lbl}</div>${rows}</div>`;
  });

  const hasAny=Object.values(selections).some(v=>v);

  const selectorHtml=`<div class="selector-card">
    <div class="sel-title">Dein Angebot für ${sc.name}</div>
    ${ncHtml}
    ${groupsHtml}
    <div id="price-summary-area">${buildPriceSummary(sc)}</div>
    <button class="btn-submit" onclick="doSubmit()" ${submitted||!hasAny?'disabled':''}>
      ${submitted?'Angebot ausgewertet ✓':'Angebot abgeben &amp; auswerten →'}
    </button>
  </div>`;

  // Feedback
  let feedbackHtml='';
  if(submitted){
    const fb=buildFeedback(sc,selections);
    const cRows=fb.correct.map(x=>`<div class="fbi fbi-g">${x.fb}</div>`).join('');
    const wRows=fb.wrong.map(x=>`<div class="fbi fbi-r">${x.fb}</div>`).join('');
    const mRows=fb.missing.map(x=>`<div class="fbi fbi-r">${x}</div>`).join('');
    const uRows=fb.upsell.map(x=>`<div class="fbi fbi-b">${x.fb}</div>`).join('');
    feedbackHtml=`<div class="feedback-wrap" id="feedback">
      <div class="fb-header">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#fff;margin-bottom:3px;">Auswertung · ${sc.name}</div>
        <div class="fb-price-row">
          <div class="fb-price-box"><div class="fb-price-lbl">Dein Angebot · monatlich</div><div class="fb-price-val" style="color:${fb.vColor}">${fmtEur(fb.monthly)}</div><div class="fb-price-sub" style="color:${fb.vColor}">${fb.verdict}</div></div>
          <div class="fb-price-box"><div class="fb-price-lbl">Dein Angebot · einmalig</div><div class="fb-price-val" style="color:var(--gold)">${fmtEur(fb.initial)}</div><div class="fb-price-sub">Onboarding Connect</div></div>
          <div class="fb-price-box"><div class="fb-price-lbl">Richtwert monatlich</div><div class="fb-price-val" style="color:var(--text2);font-size:15px">${fmtEur(fb.priceMin)}<br>bis ${fmtEur(fb.priceMax)}</div><div class="fb-price-sub">inkl. Connect 249 €</div></div>
        </div>
      </div>
      ${cRows?`<div class="fb-sec fbs-g"><div class="fb-sec-title">✓ Richtig (${fb.correct.length})</div>${cRows}</div>`:''}
      ${(wRows||mRows)?`<div class="fb-sec fbs-r"><div class="fb-sec-title">✗ Falsch / Fehlend (${fb.wrong.length+fb.missing.length})</div>${wRows}${mRows}</div>`:''}
      ${uRows?`<div class="fb-sec fbs-b"><div class="fb-sec-title">ℹ Upsell-Chancen, Empfehlungen &amp; Preistipps</div>${uRows}</div>`:''}
      <div class="fb-nav">
        <button class="btn-next" onclick="backToPick()">← Fallauswahl</button>
        <button class="btn-next" onclick="pickScenario(${nextGi})">Nächster Fall → ${SC[nextGi].name}</button>
      </div>
    </div>`;
  }

  return `
    <div class="back-bar">
      <button class="btn-back" onclick="backToPick()">← Zurück zur Fallauswahl</button>
      <span class="back-label">Fall ${li+1}/7 · ${tgLabel} · ${sgLabel}</span>
    </div>
    <div class="grid2">${customerHtml}${selectorHtml}</div>
    ${feedbackHtml}`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(phase==='tg')        app.innerHTML=renderTg();
  else if(phase==='sg')   app.innerHTML=renderSg();
  else if(phase==='pick') app.innerHTML=renderPick();
  else                    app.innerHTML=renderQuiz();
}

render();
</script>
